<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Videojuegos</title>
    
    <!-- 1. Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 2. Tu CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light"> 

    <!-- Contenedor principal: Diseño limpio y minimalista -->
    <main class="container my-5 p-4 bg-white shadow-sm rounded">
        <h1 class="text-center mb-5 fw-light">Mi Colección de Juegos</h1>
        
        <div class="row gap-4 justify-content-center">
            
            <!-- Espacio para el Formulario (Área de Benjamín) -->
            <div class="col-md-4">
                <h4 class="fw-light mb-3">Agregar Nuevo</h4>
                <!-- Aquí Benjamín armará el formulario de ingreso -->
            </div>

            <!-- Espacio para el Catálogo (Tu Área) -->
            <div class="col-md-7">
                <h4 class="fw-light mb-3">Catálogo</h4>
                <div class="row" id="contenedor-juegos">
                    <!-- Aquí tu JavaScript inyectará las tarjetas (cards) de los videojuegos -->
                </div>
            </div>

        </div>
    </main>

    <!-- 3. Bootstrap JS (Útil si luego deciden usar modales o alertas dinámicas) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 4. Tu archivo JavaScript (Siempre va al final del body) -->
    <script src="js/app.js"></script>
</body>
</html>
